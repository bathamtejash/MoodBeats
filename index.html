<!DOCTYPE html>
<html>
<head>
  <title>Mood Beats</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

  <div class="container">
    <h1>Mood Beats 👻</h1>

    <div class="search-box">
      <input id="search" placeholder="Search song or artist" />
      <button id="btn">Search</button>
    </div>
    <div class="controls">
      <select id="sort">
        <option value="az">Sort A → Z</option>
        <option value="za">Sort Z → A</option>
      </select>

      <select id="filter">
        <option value="all">All</option>
        <option value="short">Preview < 20s</option>
        <option value="long">Preview ≥ 20s</option>
      </select>

      <button id="themeToggle">🌙 Toggle Theme</button>
    </div>

    <p id="loading" class="hide">Loading...</p>
    <p id="error" class="hide">Something went wrong ❌</p>

    <div id="results"></div>
  </div>

  

  <script src="javascript.js"></script>
</body>
</html>
